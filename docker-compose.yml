services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: nexu
      POSTGRES_PASSWORD: nexu
      POSTGRES_DB: nexu_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexu -d nexu_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
